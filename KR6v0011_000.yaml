front:
  text: 最妙勝定經整理者方廣錩題解最妙勝定經又名最妙定勝經妙勝定經印度佛教經典著譯者不詳一卷本經譯於南北朝時期主要宣傳祇有修習禪定才是最妙最勝的佛法批判祇重義解忽視實際修習的風氣認為祇有通過禪定才能真正了達佛法深義即使犯了四重五逆大罪亦可由禪定而消除本經在歷史上曾經發生較大影響對天台宗影響尤大天台宗先驅慧思因讀此經而勤修禪定智青湛然的著作中也屢有引用但隋法經等撰衆經目録稱此經文理復雜真偽未分歸入疑經類開元録亦在疑惑再詳録中著録此經謂與最妙初教經文勢相似一真一偽亦將不可並在偽經録中又列入此經從此該經被判為偽經為歷代大藏經所不收故早已亡佚現在中國北京圖書館所藏敦煌文獻中發現兩號一為北新號首尾俱全原為大谷探險隊所得日本續藏經曾據以録文收入但録文有誤其後入藏北圖一為北臨號係近年新發現的殘片此經有藏文本並被收入北京版甘殊爾敦煌藏文文獻中亦有此經之藏文本法國國家圖書館藏伯號本經對研究南北朝時期佛教史及天台宗具有較大的價值整理本的底校本情況如下底本北新號校本甲本北臨號録文
