body:
  text: 如是我聞一時佛住王舍城與大比丘二萬人俱菩薩大士五十人等天龍八部諸天人等復有四天大王復有四部鬼神皆悉集會爾時世尊入光明三昧寂然無聲時諸大衆各懷疑惑爾時文殊師利法王子菩薩即從座起繞佛三匝說偈贊嘆善哉諸法王寂然入靜室此諸大衆等心皆懷疑惑善哉日月光默然無所照善哉金寶聚而不施貧乏善哉人中王今可出禪定善哉大龍王而不降甘露善哉人中尊宜速演說法善哉為衆生演說一乘義爾時世尊從禪定起告諸大衆我今安樂大有珍寶若有貧乏恣汝所用莫生疑惑所謂珍寶無上智慧恣汝所用聞爾時阿難從座而起白佛言世尊我今多聞疾得無上菩提如經中說多聞智慧利根之者得道甚難生於八難中我今云何成無上道佛告阿難多聞之人有二種心云何為二一者定心二者亂心心若在定多聞無妨心若亂者雖復多聞何所益也若人善能定慧具足最是疾得無上佛道阿難白佛言世尊云何處處經中贊嘆定慧為最第一佛言阿難定慧具足亦如師子獸中第一亦如日光能照一切如須彌山衆山中上何以故定慧具足其力最勝佛告阿難若復有人造作旃檀精舍滿於三千大千世界復有一人造七寶精舍亦滿三千大千世界功德云何得等以不阿難言七寶者勝佛復告阿難言復有一人造黃金精舍滿於三千大千世界復有一人造紫磨黃金精舍亦滿三千大千世界如此二人功德云何阿難言紫磨黃金功德甚多佛言阿難若復有人造旃檀像及香木像滿於三千大千世界供養禮拜復有一人造紫磨黃金及七寶像亦滿三千大千世界供養禮拜於此二人功德云何阿難言七寶紫磨黃金像者功德甚多佛言阿難若復有人起大心施持七寶庫藏並及妻子持用布施復有一人持頭目身體並及難得七寶庫藏布施此等二人功德云何阿難言七寶身體妻子者多佛言復有一人書寫十二部經流通世間使人讀誦滿於三千大千世界復有一人執文如讀於文通利亦滿三千大千世界於此二人功德云何阿難言執文者多佛言復有一人能誦十二部經悉皆通利不解深義其經卷亦滿三千大千世界復有一人讀誦十二部經悉皆通利並復解深義亦滿三千大千世界於此二人功德云何阿難言讀誦解說其功德甚多佛告阿難言有一人解說十二部經不行布施持戒忍辱慈悲喜捨復有一人解說十二部經廣行布施持戒忍辱慈悲喜捨於諸衆生等心如子而此二人功德云何阿難言其慈悲喜捨持戒忍辱布施衆生功德甚多佛言阿難若有一人解說十二部經講說五違陀論為人宣說流通於世復有一人善能解說十二部經十五違陀論所謂生論定論五陰論十二入論十八門論大空論日月論月愛論莊嚴論第一義論空金剛心論種諸論性空三空門論復能持戒布施忍辱慈悲喜捨於諸破戒等心無二心行平等亦如虛空不見衆生一切過惡等心衆生如視一子於怨憎中平如虛空不謗方等十二部經如此二人功德云何阿難言不謗方等十二部經其人功德無量無邊不可思議佛言復有一人如上所說一切功德皆悉能滿亦滿三千大千世界亦能讀誦十二部經十五違陀論持戒忍辱布施論持戒忍辱布施多聞於諸人中最為第一演說萬法皆悉空寂令諸聽者得五神通雖有是益不如一人一日一夜入定何以故多聞之人心生驕慢猶如山海驕慢多者惡道受苦經無量劫若出地獄生為飛鳥當知多聞何所益也若有禪定能除生死惡業重罪多聞如草禪定如火多聞如鐵禪定如金多聞如毒草禪定如藥樹多聞如江河禪定如大海我若說之禪定功德不可窮盡佛告阿難我自憶往昔作多聞士共文殊諍利諍有無二諦文殊言有我言無也由是諍論而不能定二諦有無死墮三惡道服熱鐵丸經無量劫從地獄出值迦葉佛為我解說有無二諦迦葉佛言一切諸法皆無定性汝言有無是義不然何以故一切萬法皆悉空寂此二諦者亦有亦無汝今解者但解文義不解深義汝於此義如盲如聾云何解此甚深之義我聞是即於林中而自思惟入於禪定經七日已於四禪中三昧三定三智三空大空第一義空解此空已一切萬法悉亦是空寂何以故一切萬法本性空故當知修禪最妙最勝若有人能一日一日乃至七日念修禪定於無量劫極重惡業漸漸輕微復有五種重罪一者煞父害母煞真人羅漢破塔壞寺焚燒僧房二者犯四重八重五重六重姓戒三者謗方等經四者說他人過不生恭敬常起驕慢如向所說五種性罪但修禪定自然滅除除禪定力餘無滅者七日之中尚得如是無量功德何況終身於間居山中林樹下端座思惟觀除入捨何以故心如水流恆不暫停亦如獼猴放一捉一要由定心令使不移心若移者於一切法生迷想亂心若定者能知世間生住滅想一切萬法悉皆空寂無常變化苦空無我所有諸法如電如風如水聚沫如熱時炎如呼聲響如空中鳥跡世間所有山林江河池源大海火劫起時一切燒盡除四禪及四空定乃至萬法皆悉空寂當知禪力不可思議心若有定能見十方三千大千世界日月星辰江河大海山川林谷如見掌中阿摩勒果亦如禪定現神變化飛到十方恆河世界十方世界所有風火地水日月星辰山河林木天宮龍宮悉亦變化當知禪力不可思議於禪定中能動此三千大千十方世界佛言阿難大目揵連入禪定中種種能為能動大地如轉火輪當知多聞之人不能如是佛告阿難言汝今亦可動此大地阿難言我無禪定何能如是佛言阿難若修禪定雖不即得四沙門果猶勝多聞百千萬倍爾時竹林精舍有諸比丘其數五百皆學多聞今聞世尊為阿難說目連神通禪定第一至佛所頭面禮足而白佛言世尊我等比丘習學多聞今已通達十二部經十六大國敬我如佛云何世尊說言多聞永不能得無上菩提五百比丘同時發聲我捨多聞而習禪定佛言諸比丘莫作是語我捨多聞如入禪定我見汝智亦如蚊翅欲障日月汝如盲者欲蹬須彌山如無船舫欲度大海如折翼鳥欲飛虛空汝亦如是時諸比丘心生惶怖如欲死人佛言比丘汝莫惶怖應定其心諸比丘言我無禪定何由得佛言我有妙藥令汝得定諸比丘言唯願說之我當修行佛言良藥者所謂觀除入捨諸比丘言觀除入捨我今不解唯願世尊為我說之我當受持佛言初心為觀第二心起為除第三心起為入第四心起名捨復次云何初禪為觀二禪為除三禪為入四禪為捨復次云何初禪名身念處第二心念處第三心法念處第四受念處如是四法通一切法所謂四正勤四如意足四諦四空四無想四菩提汝於初禪亦未明了況於四禪及一切法諸比丘種種方便得入禪定若作不淨觀時見身四大脾胃骨節血流亦如水九孔流出不淨之物屎尿臭穢甚可厭患於此定中見種種物若動若住若青若黃若白若黑種種異變令心散亂見此事已攝之令還白骨流光阿那波那亦亦如是若犯四重姓戒尼破八重優婆夷破五種戒沙彌破十戒學戒尼破六重盜佛物法物招提僧物師長父母物大衆僧物及謗方等經言無威德如是之人於禪定中見自身中氣如黑風血如猛火骨如山石脈如林木五藏如蛇蚖見手捉大火逆風如走頭戴大山去如復倒口出師子眼出羅剎鼻出蟒蛇耳出豺狼大小便道流水如海若有十方一切諸佛皆悉變黑若見此相從禪定起往至林中空間之處讀方等經懺悔先罪或以七日二七三七四七五七六七七七日衆罪已除便入禪定罪若薄者漸見身如琉璃山若不破四種乃至五重性戒者禪定中見十方佛同時說法或說四諦四正勤四如意足苦法忍法頂法世第一法或說七覺四禪八背捨四空三三昧八勝處禪定中見暗見明從禪定起心生悅樂時諸比丘既還林中修行禪定徑七日中皆得羅漢來詣佛所白佛言世尊我蒙佛教令脫生死得無上果佛言若得今宜可現時五百比丘現大神變坐臥空中或行或住作十八變於時多聞比丘皆習禪定亦如目連神通無二爾時阿難白佛言世尊如是妙法如來滅後幾時在此惡土流行幾所衆生修行此法得四沙門果佛言阿難吾卻後二月於拘尸城滅度之後八十年中流行此法多有衆生冢間樹下思惟此法觀除入捨十億衆生九億得四沙門果三百年時百億衆生前十億得四沙門果三百年後五百年前我諸弟子漸著惡法心懷嫉妒邪念自活五百億人十億得四沙門果五百年後八百年前我諸弟子著俗衣服畜養牛羊貓狸驢馬積聚穀米自作自啖養育奴婢當爾之時千萬億人萬人得四沙門果八百年後千年之前我諸弟子習學惡法與國王王子大臣長者而為親友通致使命耕田種植聚積穀米金銀七寶飲酒食肉長養四大著新色衣亦如淫女魃魅魍魎億億萬人百人得四沙門果千年之後三百年中浩浩亂哉我諸弟子著俗衣服雖披袈裟如木頭幡無有威德白衣見之不生恭敬亦如屠兒當爾之時國國相戰共相煞害不避君臣父子兄弟無慈悲心人民繚亂飢餓困苦無婦無夫無男無女聾盲喑啞身不具足逃奴走婢亡破失國多不存活入吾法中白衣見之如視獵師亦如天下亦如惡馬狂象不可禁制自在而去雖有師徒如惡狂賊貪淫無度不避尊卑亦如蟲獸等無有異造作惡業不畏三塗所行之處乃與酤酒屠兒獵師淫女而作伴侶口出惡言心生惡念或國官力迫脅良善如取財物供給生緣或獵射羅網取魚自煞自煮自取自啖月半月盡不共說戒布薩自恣若說戒時鬥諍瞋恚上中下座師徒弟子共相論說是非好惡亦如蚖蛇聚入一穴各相朋黨共相辱罵無尊無卑猶如群賊劫奪良善心貪利養無有饜足當爾之時十二部經沉沒於地不復讀誦我諸弟子習學兵法畫法泥法木法騎法師法棋法歌法笑法稍法射法走馬之法習學如是邪法死入惡道無殃數劫生為畜生飢餓困苦負重而行有頭陀者多不如法常遊聚落不在山林冢間樹下心恆作念窺求利養多貪財物無饜無足乃至法師解釋佛語萬不著一多將徒衆遊行聚落詣白衣舍勸化白衣多取利養飲酒食肉如栴陀羅爾時多有白衣若男若女持戒淨行不食酒肉呵責比丘汝大德出家之人心無慈悲多作爾許不如法事我觀智者亦如屠者比丘聞已競共打罵自相謂之如來在時不聽我等飲酒食肉白衣去後共相謂言今我解者如佛口說或說邪言綺語無義之語亂言綺語以作義語亦如盲人指天上日若大若小若寬若狹亦如聾人自言我聞天上說法之音有諸群盲集共住聚聽各各唱言我見日月若大若小此諸比丘亦復如是世有文殊大迦葉等現如其中競共打罵驅逐令出不令得住亦如師子居香山中一切蟲獸皆不來近師子去後百獸毒蟲共相鳴呼入香山中取其甘果飲其流泉皆令枯涸香山神仙不復擁護便生毒草食者命終吾滅度後一切比丘取我十二部經競共讀誦以上著中以中著下以下著上中著前後非義言語義言非語亦如外道各言我是當爾之時十二部經雖行於世無有德設有讀誦無有一人得四沙門果我諸弟子如失國王若鳥無翼塔寺空荒無人料理設有形像幡花寶蓋如破軍資鳩雀豬羊競共入中如是比丘自住屋舍塗淨妙好修行經說佛告阿難吾為汝等略說此事阿難聞佛說此語時流淚悲塞爾時阿難悲涕不止佛告阿難莫大悲泣當持此經流通於世阿難捫淚而言我今受持時諸天人帝釋白言尊者我亦受持若人在山林樹下空處冢間讀誦我將天人並及神鬼往詣其所不令妄失一句一偈說此經時五千比丘得四沙門果千五百比丘尼得初果五百優婆塞得清淨信天龍鬼神作禮而去録文完
